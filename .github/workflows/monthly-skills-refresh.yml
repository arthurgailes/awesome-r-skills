name: Monthly skills refresh

on:
  schedule:
    - cron: "0 9 1 * *" # 09:00 UTC, 1st of each month
  workflow_dispatch: # manual trigger for testing

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for claude-code-action
      contents: write # push branch
      pull-requests: write # open draft PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install R and extractor dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            r-base-core \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev
          sudo Rscript -e 'install.packages(c("rvest","yaml","xml2"), repos="https://cloud.r-project.org")'

      - name: Extract package metadata
        run: Rscript lib/refresh/extract.R

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: "--max-turns 40 --allowed-tools Bash,Read,Write,Edit,Glob,Grep"
          prompt: |
            Monthly R skills refresh for this repo. You are running inside a GitHub
            Actions workflow on the default branch. One PR per run. No auto-merge,
            no deletions. If nothing changed, exit cleanly without opening a PR.

            Setup:
            1. Set git identity:
                 git config user.name  "github-actions[bot]"
                 git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            2. Create branch: BRANCH="skills-refresh/$(date -u +%Y-%m)"; git checkout -b "$BRANCH".

            Per-skill refresh. For each pkg in:
              btw, collapse, duckplyr, duckspatial, ellmer, flextable,
              freestiler, mapgl, mcptools, ragnar, vitals

              a. Read lib/refresh/inputs/{pkg}.txt (pre-extracted version and
                 function list). If the file contains "error:", skip this skill
                 and add a line to the PR's "Extraction failures" section.
              b. Read skills/r-{pkg}/SKILL.md and skills/r-{pkg}/references/API.md.
                 Diff the function list against the Quick Reference table and the
                 API.md headings.
              c. Apply mechanical edits only: add new functions to the Quick
                 Reference table and to API.md with placeholder upstream
                 descriptions. Mark them clearly so the human reviewer fills in
                 the description prose.
              d. Deprecations, renames, and signature shifts go to the PR
                 punch list -- DO NOT auto-edit those.
              e. If nothing changed, skip this skill entirely.

            House rules (from CLAUDE.md):
              - native pipe |> (never %>%)
              - ASCII-only
              - required sections: Overview, When to Use, Quick Reference, Common Mistakes, When NOT to Use
              - SKILL.md under 500 lines

            Commit + PR:
              If no files changed across all skills: print a one-line summary, do
              NOT push, do NOT open a PR, and exit with code 0.

              Otherwise:
                git add -A
                git commit -m "chore(skills): monthly refresh $(date -u +%Y-%m)"
                git push -u origin "$BRANCH"
                gh pr create --draft --base master --head "$BRANCH" \
                  --title "chore(skills): monthly refresh $(date -u +%Y-%m)" \
                  --body-file <generated-body.md>

              PR body structure:
                ## Summary
                N of 11 skills changed this month.

                ## Auto-applied edits
                - r-<pkg>: <what changed> (<pkg> <version>)
                - ...

                ## Needs human review
                - r-<pkg>: <description with enough context>
                - ...

                ## Extraction failures
                - r-<pkg>: <error message from inputs/{pkg}.txt>
                - ...

                ## No changes
                - r-<pkg>, r-<pkg>, ...

                ## Verification
                - [ ] tests/skill-triggering/run-all-tests.sh passes on branch (run locally)
                - [ ] Eyeball the diff

            Constraints:
              - no --force, no --amend, no deletions
              - no changes outside skills/ (and README.md ONLY if a skill's headline feature changed)
              - do not merge; draft PR only
